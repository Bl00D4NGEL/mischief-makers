name: Mischief Makers (North America)
sha1: 811709c6473f74cbf283aa61f056e1de3046ec73
options:
  basename: mischiefmakers
  find_file_boundaries: True
  compiler: IDO
  platform: n64
  base_path: .
  target_path: baserom.z64
  symbol_name_format: $VRAM_$ROM
segments:
  - name: header
    type: header
    start: 0x0
  - name: boot
    type: bin
    start: 0x40
    vram: 0xA4000040
    subsegments:
      - [0x0040, hasm, boot]
  - name: main
    type: code
    start: 0x1000
    vram: 0x80000400
    symbol_name_format: $VRAM
    subsegments:
      - [0x01000, hasm, ../src/asm/entrypoint]
      - [0x01050, c, boot]
      - [0x01BE0, c, input]
      - [0x023D0, asm, music]
      - [0x04F80, asm, sprite]
      - [0x05510, asm]
      - [0x05A70, asm, GameSave]
      - [0x0A540, asm, GfxDraw]
      - [0x12DD0, asm] # has to do with spawning the player actor, and the camera
      - [0x13850, asm, Gamestate_Gameover]
      - [0x1E7A0, asm, ActorInit]
      - [0x23910, asm, Gamestate_Softreset]
      - [0x241E0, asm, SceneInit]
      - [0x27F70, asm, OnScreenText]
      - [0x49200, asm, ActorMarina]
      - [0x82DB0, asm] # has to do with loading marina's graphics
      - [0x844E0, asm, OnScreenDebugText]
      - [0x97770, asm, StageEndScreen]
      - [0x99750, asm] # decrypts/decompresses marina's graphics
      - [0x99B50, asm, ultralib/initialize]
      - [0x9A070, asm, ultralib/createthread]
      - [0x9A220, asm, ultralib/startthread]
      - [0x9A3C0, asm, ultralib/vimgr]
      - [0x9A820, asm, ultralib/visetmode]
      - [0x9A8F0, asm, ultralib/pimgr]
      - [0x9AC20, asm, ultralib/rmonmain]
      - [0x9B060, asm, ultralib/setthreadpri]
      - [0x9B190, asm, ultralib/virtualtophysical]
      - [0x9B250, asm, ultralib/createmesgqueue]
      - [0x9B2F0, asm, ultralib/seteventmesg]
      - [0x9B390, asm, ultralib/visetspecial]
      - [0x9B5B0, asm, ultralib/visetevent]
      - [0x9B680, asm, ultralib/contreaddata]
      - [0x9B910, asm, ultralib/recvmesg]
      - [0x9BAA0, asm, ultralib/writebackdcacheall]
      - [0x9BAD0, asm, ultralib/sptask]
      - [0x9BEE0, asm, ultralib/controller]
      - [0xBB6B0, data]
      - [0xEA3B0, data, ultralib/vitbl]
      - [0xEB0D0, bin]
  - [0x7EAFD0, bin, trailer] # 0xFF to end
  - [0x800000]