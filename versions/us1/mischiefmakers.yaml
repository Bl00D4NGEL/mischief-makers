name: Mischief Makers (North America)
sha1: 811709c6473f74cbf283aa61f056e1de3046ec73
options:
  basename: mischiefmakers
  elf_path: build/mischiefmakers.elf
  find_file_boundaries: True
  compiler: IDO
  platform: n64
  base_path: .
  asm_path: ../../asm
  src_path: ../../src
  asset_path: ../../assets
  build_path: ../../build
  target_path: ../../baserom.us1.z64
  ld_script_path: mischiefmakers.ld
  ld_dependencies: True
  symbol_name_format: $VRAM_$ROM
  header_encoding: ASCII
  hasm_in_src_path: true
  mips_abi_gpr: o32
  disassemble_all: true
  gfx_ucode: f3d
  asm_function_macro: glabel
  asm_jtbl_label_macro: jlabel
  asm_data_macro: dlabel
  asm_emit_size_directive: True
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2
  #libultra_symbols: True
  #hardware_regs: True
segments:
  - name: header
    type: header
    start: 0x0
  - name: boot
    type: bin
    start: 0x40
    vram: 0xA4000040
    subsegments:
      - [0x0040, hasm, asm/boot]
  - name: main
    type: code
    start: 0x1000
    vram: 0x80000400
    bss_size: 0x9C2D0
    symbol_name_format: $VRAM
    subsegments:
      # text
      - [0x001000, hasm, asm/entrypoint]
      - [0x001050, c, boot]
      - [0x001BE0, c, input]
      - [0x001DF0, c, dma]
      - [0x001EF0, c, gamestate]
      - [0x0023D0, asm, music] # music.c from rodata
      - [0x004F80, asm] # was called sprite, might just be for on screen debug text
      - [0x005510, asm]
      - [0x005A70, asm] # has to do with the save file
      - [0x00A540, asm] # has to do with drawing and the persp/ortho view
      - [0x011820, asm]
      - [0x012DD0, asm] # has to do with spawning the player actor, and the camera
      - [0x0134E0, asm]
