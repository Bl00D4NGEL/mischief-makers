name: Mischief Makers (North America)
sha1: 811709c6473f74cbf283aa61f056e1de3046ec73
options:
  basename: mischiefmakers
  target_path: ../../baserom.us1.z64
  elf_path: build/mischiefmakers.elf
  base_path: .
  platform: n64
  compiler: IDO
  
  asm_path: ../../asm
  src_path: ../../src
  asset_path: ../../assets
  build_path: ../../build
  create_asm_dependencies: True
  disassemble_all: True

  ld_script_path: mischiefmakers.ld
  ld_dependencies: True

  find_file_boundaries: True
  suggestion_rodata_section_start: True
  header_encoding: ASCII

  asm_function_macro: glabel
  asm_jtbl_label_macro: jlabel
  asm_data_macro: dlabel
  asm_emit_size_directive: True
  hasm_in_src_path: true
  generate_asm_macros_files: False
  
  symbol_name_format: $VRAM_$ROM
  mips_abi_gpr: o32
  
  # section_order: [".text", ".data", ".rodata", ".bss"]
  # auto_link_sections: [".data", ".rodata", ".bss"]

  symbol_addrs_path:
    - symbol_addrs_libultra.txt
    - symbol_addrs_functions.txt
    - symbol_addrs_data.txt
    
  reloc_addrs_path:
    - reloc_addrs.txt

  undefined_funcs_auto_path: undefined_funcs_auto.txt
  undefined_syms_auto_path: undefined_syms_auto.txt

  # string_encoding: ASCII
  # data_string_encoding: ASCII

  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

  #libultra_symbols: True
  #hardware_regs: True

  gfx_ucode: f3d
segments:
  - name: header
    type: header
    start: 0x0
  - name: boot
    type: bin
    start: 0x40
    vram: 0xA4000040
    subsegments:
      - [0x0040, hasm, asm/boot]
  - name: main
    type: code
    start: 0x1000
    vram: 0x80000400
    bss_size: 0x9C2D0
    symbol_name_format: $VRAM
    subsegments:
