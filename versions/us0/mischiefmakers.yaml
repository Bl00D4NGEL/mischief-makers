name: Mischief Makers (North America)
sha1: 5eb5a9d6f413a379fe297fe1542d21f728393a27
options:
  basename: mischiefmakers
  elf_path: build/mischiefmakers.elf
  find_file_boundaries: True
  compiler: IDO
  platform: n64
  base_path: .
  asm_path: ../../asm
  src_path: ../../src
  asset_path: ../../assets
  build_path: ../../build
  target_path: ../../baserom.us0.z64
  ld_script_path: mischiefmakers.ld
  ld_dependencies: True
  symbol_name_format: $VRAM_$ROM
  header_encoding: ASCII
  use_legacy_include_asm: False
  asm_function_macro: glabel
  asm_jtbl_label_macro: jlabel
  asm_data_macro: dlabel
  asm_emit_size_directive: True
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2
  #libultra_symbols: True
  #hardware_regs: True
segments:
  - name: header
    type: header
    start: 0x0
  - name: boot
    type: bin
    start: 0x40
    vram: 0xA4000040
    subsegments:
      - [0x0040, hasm, boot]
  - name: main
    type: code
    start: 0x1000
    vram: 0x80000400
    bss_size: 0x9C490
    symbol_name_format: $VRAM
    subsegments:
      - [0x1000, hasm, ../src/asm/entrypoint]
      - [0x1050, c, boot]
      - [0x1B60, c, input]
      - [0x23D0, asm]
      - [0xB97F0, data] # aspMain is around here
      - { start: 0xEDBC0, type: bss, vram: 0x800ECFC0 }
  - type: bin
    start: 0xEDBC0
    follows_vram: main
  - [0x800000]
